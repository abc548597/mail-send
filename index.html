<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>邮箱发送器</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body {
    background: #0a0a0a;
    color: #00ffcc;
    font-family: monospace;
    text-align: center;
    padding: 50px;
}

input, textarea {
    width: 90%;
    margin: 10px;
    padding: 10px;
    background: black;
    border: 1px solid #00ffcc;
    color: #00ffcc;
}

button {
    background: #00ffcc;
    color: black;
    padding: 10px 20px;
    border: none;
    cursor: pointer;
}

h1 {
    text-shadow: 0 0 10px #00ffcc;
}
</style>

</head>
<body>

<h1>⚡ Secure Mail Terminal ⚡</h1>

<input type="text" id="name" placeholder="你的名字"><br>
<input type="email" id="email" placeholder="你的邮箱"><br>
<input type="text" id="title" placeholder="标题"><br>
<textarea id="message" placeholder="输入内容"></textarea><br>

<button onclick="sendMail()">开始发送</button>

<script>
// 🔥 初始化（用你的 Public Key）
(function(){
    emailjs.init("wvqxU41LtDOj_39if"); 
})();

function sendMail() {

    let params = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        title: document.getElementById("title").value,
        message: document.getElementById("message").value
    };

    emailjs.send(
        "service_tzugn1q",     // 👉 你的 Service ID
        "template_51gdmfe",    // 👉 你的 Template ID
        params
    )
    .then(function(res) {
        alert("✅ 发送成功！");
    })
    .catch(function(err) {
        alert("❌ 失败：" + JSON.stringify(err));
    });
}
</script>

</body>
</html>
