<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>邮箱发送器</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:#fff;
    text-align:center;
    padding:20px;
}
h2{color:#38bdf8;}
input,textarea{
    width:90%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
}
button{
    padding:12px 20px;
    background:#22c55e;
    border:none;
    border-radius:10px;
    font-size:16px;
    color:#000;
}
#status{margin-top:15px;}
</style>
</head>

<body>

<h2>📧 邮箱发送器</h2>

<input type="email" id="email" placeholder="收件人邮箱">
<textarea id="message" placeholder="输入发送内容"></textarea>
<input type="number" id="count" placeholder="发送次数">

<button onclick="sendMail()">开始发送</button>

<p id="status"></p>

<script>
// ✅ 你的公钥（已帮你填好）
emailjs.init("WVqxU41LtDOj_39if");

function sendMail(){
    let email = document.getElementById("email").value;
    let message = document.getElementById("message").value;
    let count = parseInt(document.getElementById("count").value);

    if(!email || !message || !count){
        alert("请填写完整！");
        return;
    }

    let sent = 0;

    function loopSend(){
        if(sent >= count){
            document.getElementById("status").innerText = "✅ 发送完成";
            return;
        }

        emailjs.send("你的ServiceID", "你的TemplateID", {
            to_email: email,
            message: message
        }).then(function(){
            sent++;
            document.getElementById("status").innerText = "已发送：" + sent + "/" + count;

            // ⏱ 防封：每次间隔1秒
            setTimeout(loopSend, 1000);

        }, function(error){
            document.getElementById("status").innerText = "❌ 失败：" + JSON.stringify(error);
        });
    }

    loopSend();
}
</script>

</body>
</html>
